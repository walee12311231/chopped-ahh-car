[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = COM8
monitor_port = COM8
monitor_speed = 115200
upload_speed = 460800
build_flags = -DCORE_DEBUG_LEVEL=1
; Wire (I2C) is built into the Arduino-ESP32 core, no lib_deps entry needed
; for the raw-register MPU6050 driver in src/mpu6050.cpp.
